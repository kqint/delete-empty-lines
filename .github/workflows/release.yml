name: Release Obsidian plugin
on:
  workflow_dispatch:
  push:
    tags:
      - "*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm ci

      - name: Determine tag
        id: tag_info
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG=$(git tag --sort=-version:refname | head -n1)
            if [[ -z "$TAG" ]]; then
              echo "No git tags found. Exiting."
              exit 1
            fi
            echo "Latest git tag: $TAG"

            LATEST_RELEASE=$(gh release list --limit 1 --exclude-drafts --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
            if [[ -n "$LATEST_RELEASE" ]]; then
              echo "Latest published release tag: $LATEST_RELEASE"
              LOWEST=$(printf "%s\n%s" "${TAG#v}" "${LATEST_RELEASE#v}" | sort -V | head -n1)
              if [[ "$LOWEST" == "${TAG#v}" ]]; then
                echo "Git tag $TAG is not higher than latest release $LATEST_RELEASE. Exiting."
                exit 1
              fi
              echo "Git tag $TAG is newer than latest release $LATEST_RELEASE. Proceeding."
            else
              echo "No published releases found. Proceeding with tag $TAG."
            fi
          fi

          VERSION="${TAG#v}"
          echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG, version: $VERSION"

      - name: Sync version to package.json, package-lock.json and manifest.json
        run: |
          VERSION="${{ steps.tag_info.outputs.VERSION }}"
          echo "Syncing version to: $VERSION"

          sudo apt-get update && sudo apt-get install -y jq

          for file in package.json package-lock.json manifest.json; do
            if [ -f "$file" ]; then
              jq --arg v "$VERSION" '.version = $v' "$file" > temp.json && mv temp.json "$file"
              echo "Updated $file"
            fi
          done

      - name: Build plugin
        run: npm run build

      - name: Commit version bump to remote
        run: |
          VERSION="${{ steps.tag_info.outputs.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to $VERSION"
          git push

      - name: Ensure tag exists on remote
        run: |
          TAG="${{ steps.tag_info.outputs.TAG }}"
          if ! git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            git tag "$TAG"
            git push origin "$TAG"
            echo "Tag $TAG created and pushed"
          else
            echo "Tag $TAG already exists on remote"
          fi

      - name: Create release draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag_info.outputs.TAG }}"
          gh release create "$TAG" \
            --title="$TAG" \
            --draft \
            main.js manifest.json
